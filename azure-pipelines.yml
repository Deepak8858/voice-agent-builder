# =============================================================================
# VoiceForge AI — Azure DevOps Pipeline (Azure VM + GHCR)
# =============================================================================
# Prerequisites:
#   - Variable Group: "voiceforge-common" (NEXT_PUBLIC_*, Azure VM details)
#   - Variable Group per env: "voiceforge-staging-secrets", "voiceforge-prod-secrets"
#   - Service Connection: "github-service-connection" (for GHCR) OR use PAT
#   - Agent pool: ubuntu-latest (Microsoft-hosted) or self-hosted with Docker
# =============================================================================

trigger:
  branches:
    include:
      - main
      - staging

pr:
  branches:
    include:
      - main
      - staging

variables:
  - group: voiceforge-common
  - name: NODE_VERSION
    value: "20"
  - name: REGISTRY
    value: "ghcr.io"
  - name: IMAGE_PREFIX
    value: "$(Build.Repository.Name)"
  - name: DOCKER_BUILDKIT
    value: "1"

stages:
  # =========================================================================
  # Stage 1 — Build & Quality Gate
  # =========================================================================
  - stage: Build
    displayName: "Build & Test"
    jobs:
      - job: LintTypecheckTest
        displayName: "Lint + Typecheck + Test"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: "Install Node.js"

          # Cache npm registry (~/.npm) for faster package resolution
          - task: Cache@2
            displayName: "Cache npm registry"
            inputs:
              key: "$(Agent.OS)-npm-$(hashFiles('**/package-lock.json'))"
              path: "$(Pipeline.Workspace)/.npm"
              cacheHitVar: NPM_CACHE_HIT

          # Cache node_modules for monorepo workspaces
          - task: Cache@2
            displayName: "Cache node_modules"
            inputs:
              key: "$(Agent.OS)-modules-v2-$(hashFiles('**/package.json', '**/package-lock.json'))"
              path: "$(Pipeline.Workspace)/node_modules"
              cacheHitVar: NODE_MODULES_CACHE_HIT

          # Configure npm to use cached registry
          - script: npm config set cache "$(Pipeline.Workspace)/.npm" --global
            displayName: "Configure npm cache"

          - script: npm ci --ignore-scripts
            displayName: "Install dependencies"

          - script: npm run typecheck
            displayName: "Typecheck"

          - script: npm run lint
            displayName: "Lint"

          - script: npm run test -w @voiceforge/shared
            displayName: "Test shared"

          - script: npm run test -w @voiceforge/api
            displayName: "Test API"

      - job: BuildAndPush
        displayName: "Build & Push Images"
        dependsOn: LintTypecheckTest
        condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: Docker@2
            displayName: "Login to GHCR"
            inputs:
              command: login
              containerRegistry: "github-service-connection"  # Create this in Project Settings > Service Connections

          # Cache Docker layers using Azure Pipelines cache with content-based keys
          - task: Cache@2
            displayName: "Cache Docker API layers"
            inputs:
              key: "docker-api-$(hashFiles('Dockerfile.api', 'apps/api/**', 'packages/**', 'package.json'))"
              path: "$(Pipeline.Workspace)/docker-cache-api"
              cacheHitVar: DOCKER_API_CACHE_HIT

          - task: Cache@2
            displayName: "Cache Docker Web layers"
            inputs:
              key: "docker-web-$(hashFiles('Dockerfile.web', 'apps/web/**', 'packages/**', 'package.json'))"
              path: "$(Pipeline.Workspace)/docker-cache-web"
              cacheHitVar: DOCKER_WEB_CACHE_HIT

          - script: |
              # Initialize Docker BuildKit cache directories
              mkdir -p "$(Pipeline.Workspace)/docker-cache-api" "$(Pipeline.Workspace)/docker-cache-web"
              echo "Docker cache directories ready"
            displayName: "Prepare Docker cache directories"

          - script: |
              # Build and push API image with inline cache (using local directory as cache source)
              echo "Building VoiceForge API image..."
              docker buildx build \
                --platform linux/amd64 \
                --tag $(IMAGE_PREFIX)/voiceforge-api:$(Build.SourceVersion) \
                --tag $(IMAGE_PREFIX)/voiceforge-api:$(Build.SourceBranchName) \
                --tag $(IMAGE_PREFIX)/voiceforge-api:latest \
                --cache-from=type=local,src=$(Pipeline.Workspace)/docker-cache-api \
                --cache-to=type=local,dest=$(Pipeline.Workspace)/docker-cache-api,mode=max \
                --push \
                -f $(Build.SourcesDirectory)/Dockerfile.api \
                $(Build.SourcesDirectory)
            displayName: "Build & Push API"
            env:
              DOCKER_BUILDKIT: "1"

          - script: |
              # Build and push Web image with inline cache
              echo "Building VoiceForge Web image..."
              docker buildx build \
                --platform linux/amd64 \
                --build-arg NEXT_PUBLIC_API_URL=$(NEXT_PUBLIC_API_URL) \
                --build-arg NEXT_PUBLIC_APP_URL=$(NEXT_PUBLIC_APP_URL) \
                --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY) \
                --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=$(NEXT_PUBLIC_CLERK_SIGN_IN_URL) \
                --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL=$(NEXT_PUBLIC_CLERK_SIGN_UP_URL) \
                --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=$(NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL) \
                --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=$(NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL) \
                --tag $(IMAGE_PREFIX)/voiceforge-web:$(Build.SourceVersion) \
                --tag $(IMAGE_PREFIX)/voiceforge-web:$(Build.SourceBranchName) \
                --tag $(IMAGE_PREFIX)/voiceforge-web:latest \
                --cache-from=type=local,src=$(Pipeline.Workspace)/docker-cache-web \
                --cache-to=type=local,dest=$(Pipeline.Workspace)/docker-cache-web,mode=max \
                --push \
                -f $(Build.SourcesDirectory)/Dockerfile.web \
                $(Build.SourcesDirectory)
            displayName: "Build & Push Web"
            env:
              DOCKER_BUILDKIT: "1"

  # =========================================================================
  # Stage 2 — Deploy to Staging VM
  # =========================================================================
  - stage: DeployStaging
    displayName: "Deploy to Staging"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'staging'))
    variables:
      - group: voiceforge-staging-secrets
    jobs:
      - deployment: DeployToStagingVM
        displayName: "Deploy to Staging VM"
        pool:
          vmImage: "ubuntu-latest"
        environment: "staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: none

                - task: SSH@0
                  displayName: "Deploy to Azure VM (Staging)"
                  inputs:
                    sshEndpoint: "azure-vm-staging-ssh"  # Create in Service Connections
                    runOptions: "commands"
                    commands: |
                      set -euo pipefail
                      export GITHUB_REPOSITORY_OWNER=$(echo "$(Build.Repository.Name)" | cut -d'/' -f1)
                      export IMAGE_TAG=$(Build.SourceVersion)
                      export COMPOSE_PROJECT_NAME=voiceforge
                      export COMPOSE_FILE=/opt/voiceforge/docker-compose.prod.yml

                      echo "🔐 Logging in to GHCR..."
                      echo "$(GITHUB_TOKEN)" | docker login ghcr.io -u $(GITHUB_USER) --password-stdin

                      echo "📥 Pulling images..."
                      docker compose -f $COMPOSE_FILE pull

                      echo "🚀 Restarting services..."
                      docker compose -f $COMPOSE_FILE up -d --remove-orphans

                      echo "🧹 Pruning old images..."
                      docker image prune -af --filter "until=168h"

                      echo "🩺 Health checks..."
                      sleep 10
                      curl -sf http://localhost:4000/health || exit 1
                      curl -sf -o /dev/null http://localhost:3000/api/health || exit 1
                      echo "✅ Staging deployment successful"

  # =========================================================================
  # Stage 3 — Deploy to Production VM
  # =========================================================================
  - stage: DeployProduction
    displayName: "Deploy to Production"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'main'))
    variables:
      - group: voiceforge-prod-secrets
    jobs:
      - deployment: DeployToProdVM
        displayName: "Deploy to Production VM"
        pool:
          vmImage: "ubuntu-latest"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: none

                - task: SSH@0
                  displayName: "Deploy to Azure VM (Production)"
                  inputs:
                    sshEndpoint: "azure-vm-production-ssh"  # Create in Service Connections
                    runOptions: "commands"
                    commands: |
                      set -euo pipefail
                      export GITHUB_REPOSITORY_OWNER=$(echo "$(Build.Repository.Name)" | cut -d'/' -f1)
                      export IMAGE_TAG=$(Build.SourceVersion)
                      export COMPOSE_PROJECT_NAME=voiceforge
                      export COMPOSE_FILE=/opt/voiceforge/docker-compose.prod.yml

                      echo "🔐 Logging in to GHCR..."
                      echo "$(GITHUB_TOKEN)" | docker login ghcr.io -u $(GITHUB_USER) --password-stdin

                      echo "📥 Pulling images..."
                      docker compose -f $COMPOSE_FILE pull

                      echo "🚀 Restarting services..."
                      docker compose -f $COMPOSE_FILE up -d --remove-orphans

                      echo "🧹 Pruning old images..."
                      docker image prune -af --filter "until=168h"

                      echo "🩺 Health checks..."
                      sleep 10
                      curl -sf http://localhost:4000/health || exit 1
                      curl -sf -o /dev/null http://localhost:3000/api/health || exit 1
                      echo "✅ Production deployment successful"
