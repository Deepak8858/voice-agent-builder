upstream web_local {
    server 127.0.0.1:3000;
    keepalive 32;
}
upstream api_local {
    server 127.0.0.1:4000;
    keepalive 32;
}
server {
    listen 80;
    server_name vocal.devdeepak.me;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
server {
    listen 443 ssl http2;
    server_name vocal.devdeepak.me;
    ssl_certificate /etc/letsencrypt/live/vocal.devdeepak.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocal.devdeepak.me/privkey.pem;
    location /api/v1/ {
        proxy_pass http://api_local/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
    location /api/health {
        proxy_pass http://api_local/api/v1/health;
        access_log off;
    }
    location / {
        proxy_pass http://web_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
    location /_next/static/ {
        proxy_pass http://web_local;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
