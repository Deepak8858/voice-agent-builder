# =============================================================================
# VoiceForge AI — Production Docker Compose for GCP VM
# =============================================================================

services:
  web:
    image: us-central1-docker.pkg.dev/project-0d572704-81fc-488d-94b/voiceforge-containers/voiceforge-web:${IMAGE_TAG:-latest}
    container_name: vf-web
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/voiceforge-data/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    image: us-central1-docker.pkg.dev/project-0d572704-81fc-488d-94b/voiceforge-containers/voiceforge-api:${IMAGE_TAG:-latest}
    container_name: vf-api
    restart: always
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - /opt/voiceforge-data/.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.75"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: vf-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: vf-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/voiceforge-data/data/certs:/opt/certs:ro
      - /opt/voiceforge-data/data/certbot/www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  voiceforge:
    driver: bridge

volumes:
  redis_data: