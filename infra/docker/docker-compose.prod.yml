# =============================================================================
# VoiceForge AI — Production Docker Compose for AWS EC2 (Docker Swarm)
# =============================================================================
# Usage on EC2:
#   export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
#   export REGION=ap-south-1
#   export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com
#   aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites on EC2:
#   - Docker + Docker Compose v2 installed
#   - Docker Swarm initialized: docker swarm init
#   - /opt/voiceforge/.env file created from secret injection
#   - /opt/voiceforge/data/certs populated with TLS certs (self-signed or Let's Encrypt)
#   - Ports 80 and 443 open in AWS Security Group
# =============================================================================

services:
  web:
    image: ${ECR_REGISTRY}/voiceforge-web:${IMAGE_TAG:-latest}
    container_name: vf-web
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/voiceforge/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    image: ${ECR_REGISTRY}/voiceforge-api:${IMAGE_TAG:-latest}
    container_name: vf-api
    restart: always
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - /opt/voiceforge/.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.75"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: vf-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: vf-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/voiceforge/data/certs:/opt/certs:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: vf-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    environment:
      METRICS_SCRAPE_TOKEN: ${METRICS_SCRAPE_TOKEN}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana:11.0.0
    container_name: vf-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - voiceforge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  voiceforge:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data: