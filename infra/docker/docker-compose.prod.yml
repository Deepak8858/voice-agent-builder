# =============================================================================
# VoiceForge AI — Production Docker Compose for AWS EC2
# =============================================================================
# Usage on EC2 (local build):
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Usage on EC2 (ECR, after CI/CD):
#   aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin <account>.dkr.ecr.ap-south-1.amazonaws.com
#   export IMAGE_TAG=latest  # or sha tag from CI
#   docker compose -f docker-compose.prod.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites on EC2:
#   - Docker + Docker Compose v2 installed
#   - /opt/voiceforge/.env file
#   - /opt/voiceforge/data/letsencrypt -> /etc/letsencrypt (SSL certs)
#   - /opt/voiceforge/data/certbot-www (certbot webroot)
#   - /opt/voiceforge/nginx/nginx.conf
#   - Ports 80 and 443 open in AWS Security Group
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "https://vocal.devdeepak.me/api/v1"
        NEXT_PUBLIC_APP_URL: "https://vocal.devdeepak.me"
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_live_Y2xlcmsuZGV2ZGVlcGFrLm1lJA"
        NEXT_PUBLIC_SUPABASE_URL: "https://nsgshzxxhytjmiiasobc.supabase.co"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_8RlbxXqpf_pC9v7sj6yEAg_2dCh4-IC"
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: "/dashboard"
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: "/dashboard"
    image: voiceforge-web:latest
    container_name: vf-web
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - /opt/voiceforge/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.api
    image: voiceforge-api:latest
    container_name: vf-api
    restart: always
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - /opt/voiceforge/.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: vf-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: vf-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/letsencrypt:/etc/letsencrypt:ro
      - ./data/certbot-www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - voiceforge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  voiceforge:
    driver: bridge

volumes:
  redis_data: