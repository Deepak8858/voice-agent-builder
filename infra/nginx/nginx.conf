# =============================================================================
# VoiceForge AI — Nginx Reverse Proxy (AWS EC2 Docker Swarm)
# =============================================================================
# Features:
#   - Redirect HTTP → HTTPS
#   - Reverse proxy /api/v1/* to NestJS backend (port 4000)
#   - Reverse proxy all other traffic to Next.js frontend (port 3000)
#   - Let's Encrypt certbot integration
#   - Gzip compression, security headers, rate limiting
#   - Graceful connection draining for zero-downtime deploys
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Performance & connection handling
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Rate limiting (per IP)
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Logging (JSON format for CloudWatch/Graylog)
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Upstreams (Docker service names resolved via internal DNS)
    # -------------------------------------------------------------------------
    upstream web_upstream {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream api_upstream {
        server api:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP — redirect everything to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        # Let's Encrypt certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS — primary server block
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # ----------------------------------------------------------------------
        # TLS certificates (Let's Encrypt via certbot)
        # ----------------------------------------------------------------------
        ssl_certificate /opt/certs/fullchain.pem;
        ssl_certificate_key /opt/certs/key.pem;
        ssl_trusted_certificate /opt/certs/fullchain.pem;

        # ----------------------------------------------------------------------
        # SSL hardening
        # ----------------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ----------------------------------------------------------------------
        # Security headers
        # ----------------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        proxy_hide_header Permissions-Policy;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ----------------------------------------------------------------------
        # ACME challenge location (HTTPS)
        # ----------------------------------------------------------------------
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ----------------------------------------------------------------------
        # API proxy (/api/v1/*)
        # ----------------------------------------------------------------------
        location ~ ^/api/v1/ {
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn addr 20;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ----------------------------------------------------------------------
        # Health check endpoint (bypass rate limits for load balancer probes)
        # ----------------------------------------------------------------------
        location /api/health {
            proxy_pass http://api_upstream/api/v1/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ----------------------------------------------------------------------
        # Grafana proxy (/grafana/*)
        # ----------------------------------------------------------------------
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------------------
        # Frontend proxy (all other traffic)
        # ----------------------------------------------------------------------
        location / {
            limit_req zone=web_limit burst=300 nodelay;
            limit_conn addr 50;

            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ----------------------------------------------------------------------
        # Static asset caching (Next.js _next/static)
        # ----------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://web_upstream;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ----------------------------------------------------------------------
        # Static files (public folder)
        # ----------------------------------------------------------------------
        location /favicon.ico {
            proxy_pass http://web_upstream;
            access_log off;
            expires 30d;
        }
    }
}