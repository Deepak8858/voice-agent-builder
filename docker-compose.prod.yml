# =============================================================================
# VoiceForge AI — Production Docker Compose (Azure VM)
# =============================================================================
# Usage on target VM (after pulling from GHCR):
#   export GHCR_PAT=<github-classic-pat-or-fine-grained-token>
#   echo $GHCR_PAT | docker login ghcr.io -u <GITHUB_USERNAME> --password-stdin
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites on VM:
#   - Docker + Docker Compose v2 installed
#   - /opt/voiceforge/.env file created from secure secret injection
#   - /opt/voiceforge/nginx/ssl/ populated with TLS certs (Let's Encrypt or KV)
#   - Ports 80 and 443 open in Azure NSG
# =============================================================================

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: vf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    networks:
      - voiceforge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: voiceforge-web:${IMAGE_TAG:-latest}
    container_name: vf-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - voiceforge
    logging:
      # Structured JSON logs to stdout — consumed by cloud logging / Loki / ELK
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  api:
    image: voiceforge-api:${IMAGE_TAG:-latest}
    container_name: vf-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      # Runtime secrets injected via .env (never committed)
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - voiceforge
    logging:
      # API emits pino JSON to stdout; json-file driver preserves structure for collection
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.75"
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Self-hosted Redis on the VM (co-located with app for low latency).
  # Use Azure Cache for Redis in production for HA + persistence.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - voiceforge
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  voiceforge:
    driver: bridge

volumes:
  nginx_cache:
  redis_data:
