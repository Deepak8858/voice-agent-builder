# =============================================================================
# VoiceForge AI — CI/CD Pipeline for AWS EC2
# =============================================================================
# Targets: voiceforge EC2 instance (ap-south-1)
# Registry: AWS ECR (ap-south-1)
# Deployment: Docker Compose via SSH
# =============================================================================

name: CI/CD — AWS EC2

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  AWS_REGION: ap-south-1

jobs:
  # =========================================================================
  # Phase 1 — Quality Gate (runs on PR + push)
  # =========================================================================
  lint-typecheck-test:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate -w @voiceforge/api

      - name: Build shared package
        run: npm run build -w @voiceforge/shared

      - name: Typecheck
        run: npm run typecheck

  # =========================================================================
  # Phase 2 — Build & Push Container Images to AWS ECR
  # =========================================================================
  build-and-push:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/voiceforge-api
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.environment }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/voiceforge-web
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.environment }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Validate required build-time secrets
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          missing=()
          for v in NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
                   NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL NEXT_PUBLIC_SUPABASE_URL; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required build-time values: ${missing[*]}"
            echo "Set them in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL }}

      - name: Summarize image tags
        run: |
          echo "### Images pushed to AWS ECR" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ steps.meta-api.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ steps.meta-web.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Phase 3 — Deploy to AWS EC2
  # =========================================================================
  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'staging' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=production" >> $GITHUB_OUTPUT
          else
            echo "target=staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script_stop: true
          envs: AWS_REGION,COMPOSE_PROJECT_NAME
          script: |
            set -euo pipefail
            export PATH=$HOME/.local/bin:/usr/local/bin:$PATH

            export AWS_REGION="${{ env.AWS_REGION }}"
            export AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
            export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
            export IMAGE_TAG="$(echo "${{ github.sha }}" | cut -c1-7)"

            echo "🔐 Logging in to ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            echo "📝 Writing /opt/voiceforge/.env from CI secrets..."
            sudo mkdir -p /opt/voiceforge
            sudo tee /opt/voiceforge/.env > /dev/null <<'ENVEOF'
            NODE_ENV=production
            API_PORT=4000
            WEB_PORT=3000
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SUPABASE_STORAGE_BUCKET=${{ vars.SUPABASE_STORAGE_BUCKET || 'voiceforge' }}
            REDIS_URL=redis://redis:6379
            AUTH_PROVIDER=clerk
            VOICE_PROVIDER=${{ vars.VOICE_PROVIDER || 'mock' }}
            VAPI_API_KEY=${{ secrets.VAPI_API_KEY }}
            VAPI_WEBHOOK_SECRET=${{ secrets.VAPI_WEBHOOK_SECRET }}
            VAPI_PHONE_NUMBER_ID=${{ secrets.VAPI_PHONE_NUMBER_ID }}
            RETELL_API_KEY=${{ secrets.RETELL_API_KEY }}
            RETELL_WEBHOOK_SECRET=${{ secrets.RETELL_WEBHOOK_SECRET }}
            LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'mock' }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            ANTHROPIC_MODEL=${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GITHUB_TOKEN=${{ secrets.LLM_GITHUB_TOKEN }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_STARTER_PRICE_ID=${{ vars.STRIPE_STARTER_PRICE_ID }}
            STRIPE_GROWTH_PRICE_ID=${{ vars.STRIPE_GROWTH_PRICE_ID }}
            STRIPE_ENTERPRISE_PRICE_ID=${{ vars.STRIPE_ENTERPRISE_PRICE_ID }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ vars.EMAIL_FROM || 'VoiceForge <noreply@voiceforge.ai>' }}
            WEB_BASE_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
            METRICS_SCRAPE_TOKEN=${{ secrets.METRICS_SCRAPE_TOKEN }}
            VOICE_WEBHOOK_SECRET=${{ secrets.VOICE_WEBHOOK_SECRET }}
            ENVEOF
            sudo chown root:root /opt/voiceforge/.env
            sudo chmod 600 /opt/voiceforge/.env

            echo "📥 Pulling images..."
            sudo IMAGE_TAG=${IMAGE_TAG} ECR_REGISTRY=${ECR_REGISTRY} \
              docker compose -f /opt/voiceforge/docker-compose.prod.yml pull

            echo "🗃️  Running Prisma migrations..."
            sudo IMAGE_TAG=${IMAGE_TAG} ECR_REGISTRY=${ECR_REGISTRY} \
              docker compose -f /opt/voiceforge/docker-compose.prod.yml run --rm \
              --entrypoint sh api -c "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma"

            echo "🚀 Restarting services..."
            sudo IMAGE_TAG=${IMAGE_TAG} ECR_REGISTRY=${ECR_REGISTRY} \
              docker compose -f /opt/voiceforge/docker-compose.prod.yml up -d --remove-orphans

            echo "🧹 Pruning old images..."
            sudo docker image prune -af --filter "until=168h"

            echo "🩺 Health checks..."
            sleep 15
            curl -sf --max-time 10 http://localhost:4000/api/v1/health && echo " API OK" || { echo " API FAIL"; sudo docker compose -f /opt/voiceforge/docker-compose.prod.yml logs api --tail=100; exit 1; }
            curl -sf --max-time 10 -o /dev/null -w "%{http_code}\n" http://localhost:3000/api/health | grep -q "200" && echo " Web OK" || { echo " Web FAIL"; sudo docker compose -f /opt/voiceforge/docker-compose.prod.yml logs web --tail=100; exit 1; }
            echo "✅ Deployment complete"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ steps.env.outputs.target }} failed. Check logs: ssh ubuntu@${{ secrets.AWS_EC2_HOST }} 'docker compose -f /opt/voiceforge/docker-compose.prod.yml logs'"