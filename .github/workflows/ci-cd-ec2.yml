# =============================================================================
# VoiceForge AI — CI/CD Pipeline for AWS EC2
# =============================================================================
# Targets: voiceforge EC2 instance (ap-south-1)
# Registry: AWS ECR (ap-south-1)
# Deployment: Docker Compose via SSH
# =============================================================================

name: CI/CD — AWS EC2

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  AWS_REGION: ap-south-1

jobs:
  # =========================================================================
  # Phase 1 — Quality Gate (runs on PR + push)
  # =========================================================================
  lint-typecheck-test:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate -w @voiceforge/api

      - name: Build shared package
        run: npm run build -w @voiceforge/shared

      - name: Typecheck
        run: npm run typecheck

  # =========================================================================
  # Phase 2 — Build & Push Container Images to AWS ECR
  # =========================================================================
  build-and-push:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/voiceforge-api
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.environment }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/voiceforge-web
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.environment }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Validate required build-time secrets
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          missing=()
          for v in NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
                   NEXT_PUBLIC_API_URL NEXT_PUBLIC_APP_URL NEXT_PUBLIC_SUPABASE_URL; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required build-time values: ${missing[*]}"
            echo "Set them in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL }}

      - name: Summarize image tags
        run: |
          echo "### Images pushed to AWS ECR" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ steps.meta-api.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ steps.meta-web.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Phase 3 — Deploy to AWS EC2
  # =========================================================================
  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'staging' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=production" >> $GITHUB_OUTPUT
          else
            echo "target=staging" >> $GITHUB_OUTPUT
          fi

      - name: Upload compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          source: "infra/docker/docker-compose.prod.yml"
          target: "/tmp/"
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script_stop: true
          envs: AWS_REGION,COMPOSE_PROJECT_NAME
          script: |
            set -euo pipefail
            export PATH=$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH

            export AWS_REGION="${{ env.AWS_REGION }}"
            export AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
            export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
            export IMAGE_TAG="$(echo "${{ github.sha }}" | cut -c1-7)"
            export COMPOSE_FILE=/opt/voiceforge/docker-compose.prod.yml

            echo "📄 Updating compose file from repo..."
            sudo mkdir -p /opt/voiceforge
            sudo mv /tmp/docker-compose.prod.yml ${COMPOSE_FILE}
            sudo chmod 644 ${COMPOSE_FILE}

            echo "🔍 Verifying /opt/voiceforge/.env exists on EC2..."
            if ! sudo test -f /opt/voiceforge/.env; then
              echo "::error::/opt/voiceforge/.env missing on EC2. Create it manually before deploy."
              exit 1
            fi

            echo "🔓 Ensuring deploy user can read /opt/voiceforge/.env..."
            # File may be root-owned with 600 perms. Grant deploy user's group read access
            # so docker compose (running as deploy user) can read env_file. Stays unreadable
            # to other users.
            sudo chgrp "$(id -gn)" /opt/voiceforge/.env
            sudo chmod 640 /opt/voiceforge/.env

            echo "🔐 Logging in to ECR..."
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            echo "📥 Pulling images..."
            docker compose -f ${COMPOSE_FILE} pull

            echo "🗃️  Running Prisma migrations..."
            docker compose -f ${COMPOSE_FILE} run --rm \
              --entrypoint sh api -c "npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma"

            echo "🚀 Restarting services..."
            docker compose -f ${COMPOSE_FILE} up -d --remove-orphans

            echo "🧹 Pruning old images..."
            docker image prune -af --filter "until=168h"

            echo "🩺 Health checks..."
            sleep 15
            curl -sf --max-time 10 http://localhost:4000/api/v1/health && echo " API OK" || { echo " API FAIL"; docker compose -f ${COMPOSE_FILE} logs api --tail=100; exit 1; }
            curl -sf --max-time 10 -o /dev/null -w "%{http_code}\n" http://localhost:3000/api/health | grep -q "200" && echo " Web OK" || { echo " Web FAIL"; docker compose -f ${COMPOSE_FILE} logs web --tail=100; exit 1; }
            echo "✅ Deployment complete"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ steps.env.outputs.target }} failed. Check logs: ssh ubuntu@${{ secrets.AWS_EC2_HOST }} 'docker compose -f /opt/voiceforge/docker-compose.prod.yml logs'"