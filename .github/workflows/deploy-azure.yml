name: Deploy to Azure

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  RG: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'staging' }}
    outputs:
      apiFqdn: ${{ steps.deploy.outputs.apiFqdn }}
      webFqdn: ${{ steps.deploy.outputs.webFqdn }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RG }}
          template: ./infra/bicep/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'staging' }}
            acrAdminUserEnabled=true
            apiImage=${{ secrets.AZURE_ACR_LOGIN_SERVER }}/voiceforge-api:${{ github.sha }}
            webImage=${{ secrets.AZURE_ACR_LOGIN_SERVER }}/voiceforge-web:${{ github.sha }}
            databaseUrl=${{ secrets.DATABASE_URL }}
            directUrl=${{ secrets.DIRECT_URL }}
            redisUrl=${{ secrets.REDIS_URL }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            encryptionKey=${{ secrets.ENCRYPTION_KEY }}
            clerkSecretKey=${{ secrets.CLERK_SECRET_KEY }}
            clerkPublishableKey=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            openaiApiKey=${{ secrets.OPENAI_API_KEY }}
            vapiApiKey=${{ secrets.VAPI_API_KEY }}
          failOnStdErr: false

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'staging' }}
    steps:
      - name: Health check API
        run: |
          curl -sf ${{ needs.deploy-infra.outputs.apiFqdn }}/health || exit 1
      - name: Health check Web
        run: |
          curl -sf -o /dev/null ${{ needs.deploy-infra.outputs.webFqdn }} || exit 1
